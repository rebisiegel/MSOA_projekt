apiVersion: apps/v1
kind: Deployment
metadata:
  name: subject-db-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: subject-db
  template:
    metadata:
      labels:
        app: subject-db
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: global-secrets
              key: mysql-root-password
        - name: MYSQL_DATABASE
          value: "subject_service_db"
---
apiVersion: v1
kind: Service
metadata:
  name: subject-db-service
spec:
  ports:
  - port: 3306
  selector:
    app: subject-db